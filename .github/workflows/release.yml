name: release

on:
  push:
    tags:
    - '*'
    branches-ignore:
    - '*'

jobs:
  build_sdist:
    name: sdist
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6

    - name: Write version file
      run: sed -i 's/^version = "0\.1\.0"$/version = "${{ github.ref_name }}"/' pyproject.toml

    - name: Build sdist
      run: pipx run build --sdist

    - name: Check metadata
      run: pipx run twine check dist/*

    - uses: actions/upload-artifact@v6
      with:
        name: 'artifact-source'
        path: dist/*.tar.gz

  build_wheels:
    name: ${{ matrix.platform }}
    runs-on: ${{ matrix.image }}
    strategy:
      fail-fast: false
      matrix:
        include:
        - image: ubuntu-latest
          platform: linux
        - image: macos-15-intel
          platform: macos-intel
        - image: macos-15
          platform: macos-arm
        - image: windows-latest
          platform: windows

    steps:
    - uses: actions/checkout@v6
      with:
        submodules: recursive

    - name: Cache Conan
      id: cache-conan
      uses: actions/cache@v3
      if: matrix.platform == 'windows'
      with:
        path: |
          conan_build
          conan_data
        key: conan-${{ matrix.image }}-${{ hashFiles('conanfile.txt') }}

    - name: Configure Python
      uses: actions/setup-python@v5
      if: matrix.platform == 'windows' && steps.cache-conan.outputs.cache-hit != 'true'
      with:
        python-version: 3.x

    - name: Install Conan
      if: matrix.platform == 'windows' && steps.cache-conan.outputs.cache-hit != 'true'
      run: |
        pip install pip --upgrade
        pip install conan<2.0.0
        conan profile new default --detect
        conan profile update "settings.compiler=Visual Studio" default
        conan profile update "settings.compiler.version=17" default
        conan config set "storage.path=$env:GITHUB_WORKSPACE/conan_data"
        conan install --build=openssl --build=glpk --install-folder conan_build .

    - name: Set up QEMU
      if: matrix.platform == 'linux' && runner.arch == 'X64'
      uses: docker/setup-qemu-action@v3
      env:
        CIBW_ARCHS_LINUX: ${{ runner.arch == 'X64' && 'auto ppc64le s390x' || 'auto' }}

    - name: Set version
      if: matrix.platform != 'macos-arm' && matrix.platform != 'macos-intel'
      run: |
        sed -i 's/^version = "0\.1\.0"$/version = "${{ github.ref_name }}"/' pyproject.toml

    - name: Set version
      if: matrix.platform == 'macos-arm' || matrix.platform == 'macos-intel'
      run: |
        sed -i "" 's/^version = "0\.1\.0"$/version = "${{ github.ref_name }}"/' pyproject.toml

    - name: Build wheels
      if: matrix.platform != 'macos-arm'
      uses: pypa/cibuildwheel@v3.3.1
      env:
        MACOSX_DEPLOYMENT_TARGET: 15.0
        CC: gcc-15
        CXX: g++-15

    - name: Build wheels
      if: matrix.platform == 'macos-arm'
      uses: pypa/cibuildwheel@v3.3.1
      env:
        MACOSX_DEPLOYMENT_TARGET: 15.0
        CC: gcc-15
        CXX: g++-15

    - name: Upload wheels
      uses: actions/upload-artifact@v6
      with:
        name: 'artifact-${{ matrix.platform }}'
        path: '*/pyvroom-*.whl'

  upload:
    name: upload
    needs: [build_wheels, build_sdist]
    runs-on: ubuntu-latest

    steps:
    - uses: actions/setup-python@v5

    - uses: actions/download-artifact@v6
      with:
        pattern: "artifact-*"
        merge-multiple: true

    - name: place files
      run: |
        mkdir -p dist/
        mv -v pyvroom-*.tar.gz wheelhouse/pyvroom-*.whl dist/

    - uses: pypa/gh-action-pypi-publish@v1.13.0
      with:
        user: __token__
        password: ${{ secrets.pypi_password }}
